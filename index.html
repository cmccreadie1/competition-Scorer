<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sea Diary: Match Edition Pro</title>
    
    <script>
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            window.location.href = 'app.html';
        }
    </script>

    <link rel="manifest" href="/competition-Scorer/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hidden by default, shown via logic */
        #installContainer, #openAppContainer {
            display: none;
        }
    </style>
</head>
<body class="h-full flex flex-col items-center justify-center p-6 text-center">

    <header class="mb-8">
        <div class="w-20 h-20 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/20">
            <i class="fas fa-anchor text-3xl text-white"></i>
        </div>
        <h1 class="text-4xl font-black mb-2">Sea Diary</h1>
        <p class="text-xl font-bold gradient-text">Match Edition Pro</p>
    </header>

    <main class="w-full max-w-md">
        
        <div id="installContainer" class="bg-slate-900 border border-slate-800 p-6 rounded-3xl mb-6 shadow-xl">
            <h2 class="text-lg font-bold mb-4">Ready to Install?</h2>
            <button id="installBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all transform active:scale-95 flex items-center justify-center gap-3">
                <i class="fas fa-download"></i>
                INSTALL NOW
            </button>
        </div>

        <div id="openAppContainer" class="bg-slate-900 border border-slate-800 p-6 rounded-3xl mb-6 shadow-xl">
            <h2 class="text-lg font-bold mb-4">App Already Installed</h2>
            <a href="app.html" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl transition-all transform active:scale-95 flex items-center justify-center gap-3">
                <i class="fas fa-external-link-alt"></i>
                OPEN APP
            </a>
        </div>

        <div id="manualInstructions" class="space-y-6">
            <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-3xl">
                <h3 class="font-bold text-slate-400 uppercase text-sm tracking-widest mb-4">Manual Installation</h3>
                
                <div class="flex items-start gap-4 text-left mb-6">
                    <div class="bg-slate-800 p-3 rounded-xl"><i class="fab fa-apple text-xl"></i></div>
                    <div>
                        <p class="font-bold">iPhone / iPad</p>
                        <p class="text-sm text-slate-400">Tap <i class="fas fa-share-square mx-1 text-blue-400"></i> then <span class="text-white">"Add to Home Screen"</span></p>
                    </div>
                </div>

                <div class="flex items-start gap-4 text-left">
                    <div class="bg-slate-800 p-3 rounded-xl"><i class="fab fa-android text-xl text-emerald-400"></i></div>
                    <div>
                        <p class="font-bold">Android / Chrome</p>
                        <p class="text-sm text-slate-400">Tap the <i class="fas fa-ellipsis-v mx-1 text-slate-400"></i> menu and select <span class="text-white">"Install App"</span></p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="mt-auto pt-8 text-slate-500 text-xs">
        &copy; 2026 Sea Diary Pro • v1.0.4
    </footer>

    <script>
        let deferredPrompt;
        const installContainer = document.getElementById('installContainer');
        const installBtn = document.getElementById('installBtn');
        const manualInstructions = document.getElementById('manualInstructions');
        const openAppContainer = document.getElementById('openAppContainer');

        // Check if the user has previously installed the app (using a flag)
        if (localStorage.getItem('pwa_installed') === 'true') {
            manualInstructions.style.display = 'none';
            openAppContainer.style.display = 'block';
        }

        // Catch the browser's install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            deferredPrompt = e;
            
            // Show the "Install Now" button and hide manual instructions
            installContainer.style.display = 'block';
            manualInstructions.style.display = 'none';
        });

        // Handle the click on "Install Now"
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Show the install prompt
                deferredPrompt.prompt();
                // Wait for the user to respond to the prompt
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                    localStorage.setItem('pwa_installed', 'true');
                }
                deferredPrompt = null;
            }
        });

        // Listen for successful installation
        window.addEventListener('appinstalled', (evt) => {
            console.log('App was successfully installed');
            localStorage.setItem('pwa_installed', 'true');
            installContainer.style.display = 'none';
            openAppContainer.style.display = 'block';
            manualInstructions.style.display = 'none';
        });

        // Register Service Worker (Standard Requirement)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/competition-Scorer/service-worker.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>

</body>
</html>
