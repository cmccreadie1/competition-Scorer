<!DOCTYPE html>
<html lang="en" class="h-full bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Sea Score Pro | Entry</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sea Score Pro">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Live Sea Score Pro">
    <meta property="og:description" content="The ultimate real-time match engine for beach anglers.">
    <meta property="og:image" content="icon-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-amber: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .splash-gradient {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
        }

        .neon-glow {
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
        }

        @keyframes icon-pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.2)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(0, 243, 255, 0.5)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.2)); }
        }

        .animate-icon {
            animation: icon-pulse 4s infinite ease-in-out;
        }

        @keyframes shadow-flow {
            0% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
            50% { box-shadow: 0 0 30px rgba(0, 243, 255, 0.5); }
            100% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        }

        .launch-btn {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            animation: shadow-flow 3s infinite;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .launch-btn:active {
            transform: scale(0.92);
            filter: brightness(1.2);
        }

        .version-tag {
            letter-spacing: 0.5em;
            opacity: 0.4;
        }
    </style>
</head>
<body class="splash-gradient">

    <div class="flex-1 flex flex-col items-center justify-center p-8 space-y-10">
        
        <div class="relative">
            <div class="absolute inset-0 bg-cyan-500/10 blur-3xl rounded-full"></div>
            <img src="icon-512.png" alt="Logo" class="w-40 h-40 mx-auto rounded-[2.5rem] border border-white/10 relative z-10 animate-icon shadow-2xl">
        </div>

        <div class="text-center space-y-2 relative z-10">
            <h1 class="text-4xl font-black tracking-tighter neon-glow uppercase italic">Live Sea Score</h1>
            <div class="flex items-center justify-center space-x-3">
                <div class="h-[1px] w-8 bg-cyan-500/50"></div>
                <p class="text-cyan-400 font-black text-[11px] tracking-[0.4em] uppercase opacity-90">Pro Match Engine</p>
                <div class="h-[1px] w-8 bg-cyan-500/50"></div>
            </div>
        </div>

        <div class="w-full max-w-xs space-y-4 pt-4 relative z-10">
            <button onclick="handleLaunch()" class="launch-btn w-full text-black font-black py-5 rounded-[1.5rem] uppercase tracking-[0.2em] text-sm shadow-xl flex items-center justify-center">
                <span>Start Session</span>
                <i class="fa-solid fa-chevron-right ml-3 text-[10px] opacity-60"></i>
            </button>
            
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest text-center px-4 leading-relaxed">
                Cloud Sync • Offline Protection • Pro Scoring
            </p>
        </div>
    </div>

    <div class="pb-12 text-center space-y-3 relative z-10">
        <div id="status-bar" class="flex items-center justify-center space-x-2">
            <div id="status-dot" class="w-1.5 h-1.5 bg-slate-700 rounded-full"></div>
            <span id="status-text" class="text-[10px] font-black text-slate-500 tracking-[0.2em] uppercase">Initialising...</span>
        </div>
        <div class="version-tag text-[9px] font-black text-slate-600 uppercase version-display">Version 102</div>
    </div>

    <script>
        // Force manual launch for better PWA transition
        function handleLaunch() {
            window.location.href = 'app.html';
        }

        // Single Source of Truth - Version Fetch
        function syncVersion() {
            fetch('version.json')
                .then(res => res.json())
                .then(data => {
                    document.querySelectorAll('.version-display').forEach(el => {
                        el.innerText = `Version ${data.version}`;
                    });
                })
                .catch(() => console.log('Version sync offline.'));
        }

        // Service Worker Registration & Status
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    document.getElementById('status-text').innerText = "System Online";
                    document.getElementById('status-dot').classList.replace('bg-slate-700', 'bg-cyan-500');
                    document.getElementById('status-dot').classList.add('animate-pulse');
                }).catch(err => {
                    document.getElementById('status-text').innerText = "Ready Offline";
                    document.getElementById('status-dot').classList.replace('bg-slate-700', 'bg-amber-500');
                });
            });
        }

        // Initialize
        syncVersion();

        // Prevent accidental "swipe down to refresh" on the splash screen
        document.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'BUTTON') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>

</body>
</html>
